# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: divorcejointpetition_next_steps
  docx template file: jointpetitionfordivorce_next_steps.docx
  variable name: divorcejointpetition_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
