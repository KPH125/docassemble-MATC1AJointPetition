id: Cautionary message jurisdiction
event: cautionary_message_jurisdiction
question: |
  Eligibility for Divorce in Massachusetts
subquestion: |
  You can file for divorce in Massachusetts if:
  * You've lived in the state for 1 year, or;
  * The reason the marriage ended happened in Massachusetts and you've lived in the state as a couple
  
  If you remain unsure whether you are eligible for divorce in Massachusetts, you may wish to speak to an attorney licensed to practice in MA to discuss your options. 
  
buttons: 
  - Continue: continue
  - Exit: exit
---
id: Divorce type
question: |
 Joint petition for divorce under [G.L. c. 208, § 1 A](https://malegislature.gov/Laws/GeneralLaws/PartII/TitleIII/Chapter208/Section1a)
subquestion: | 
  Do ${  users[0].name_full()  } and ${  users[1].name_full()  } both agree that you want to:
fields:
  - "get divorced": divorce_affirm
    datatype: yesno
  - "file together (jointly)": joint_petition_affirm
    datatype: yesno
    show if: divorce_affirm
  - "file a complete, notarized separation agreement at the time of filing or within 90 days thereafter": notarize_affirm
    datatype: yesno
    show if: joint_petition_affirm
---
id: Agreement on major issues
question: | 
  Agreement on major issues
subquestion: |
  You will need to explain to the court how you will handle any issues related to your divorce. 
  These issues may include:
  
  * Child support
  * Parenting time
  * Child custody
  * Alimony
  * Diving shared property (marital assets)
  * Health insurance 

    There are different ways to reach an agreement. Some negotiate on their own while others hire lawyers. Some use mediators to help settle the issues.
  
  **Do ${  users[0].name_full()  } and ${  users[1].name_full()  } agree on how to resolve all major issues, such as property division, child custody, and child support?**
fields: 
  - "We agree on the major issues": separation_agreement_reached
    datatype: yesnoradio
---
id: Separation agreement status
question: |
  Separation agreement
subquestion: |
  You will need to write a separation agreement. 
  
  A separation agreement is a written contract between you and your spouse. It explains how you will handle any issues related to your divorce.

  Both parties must sign the agreement and it must be notarized (signed by a notary).
 
  A complete, notarized separation agreement is strongly encouraged but not required at the time of filing.
  
fields: 
  - "We have prepared a detailed written separation agreement that fully captures our agreement on all relevant issues": separation_agreement_documented
    datatype: yesnoradio
    help: |
      If you do not already have a complete written separation agreement you will be able to create one.
---
id: Separation agreement format
question: |
  Separation agreement format
subquestion: |
  Anyone filing a joint petition for divorce must file a separation agreement within 90 days of initial filing. 
  The separation agreement must be notarized and should completely address all major issues such as property division, child custody, and child support. 
  You are highly encouraged to submit a complete, notarized agreement with initial filing. 
fields: 
  - "How would you like to file your separation agreement?": separation_agreement_format
    input type: radio
    choices: 
      - "Upload my complete, notarized separation agreement here": upload
        show if: separation_agreement_documented
      - "File my complete, notarized separation agreement with the registry later" : wait
      - "Create a separation agreement using this interview tool": interview
        show if: separation_agreement_documented == False
---
id: Upload agreement
question: |
  Upload separation agreement
fields:
  - "Upload agreement": separation_agreement_upload
    datatype: file
---
id: Cautionary message notarized separation agreement
continue button field: cautionary_message_delay_agreement
question: |
  Confirm information
subquestion: |
  You have indicated that you will file your notarized separation agreement later. Confirm that you understand:
  
  * You must file a separation agreement within 90 days of filing a joint petition for divorce (1A)
  * Your separation agreement must be notarized
  * Your separation agreement should address all issues such as property division, child custody, and child support

---
#Merger Separation Help Language
#A separation agreement can be a binding contract between you and your spouse. This is a separation agreement that “survives” the divorce. Sometimes, it is not a separate contract and is not binding until the judge approves it. If the judge approves the agreement, it becomes part of the divorce judgment. This is a separation agreement that has “merged” with the divorce judgment.
