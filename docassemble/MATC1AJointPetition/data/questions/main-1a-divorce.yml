---
table: users.table
rows: users
columns:
  - Name: |
      row_item.name_full() if defined("row_item.name.first") else ""
  - Address: |
      row_item.address.block() if defined("row_item.address.zip") else ""
edit:
  - name.first
  - address.zip
confirm: True

