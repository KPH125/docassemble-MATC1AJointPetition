---
# ALDocument objects specify the metadata for each template
objects:
  - divorcejointpetition_Post_interview_instructions: ALDocument.using(title="Instructions", filename="divorcejointpetition_next_steps.docx", enabled=True, has_addendum=False)
  - divorcejointpetition_attachment: ALDocument.using(title="Joint1ADivorce", filename="divorcejointpetition", enabled=True, has_addendum=True, default_overflow_message=AL_DEFAULT_OVERFLOW_MESSAGE)
---
# Bundles group the ALDocuments into separate downloads, such as for court and for the user
objects:
  - al_user_bundle: ALDocumentBundle.using(elements=[divorcejointpetition_Post_interview_instructions, divorcejointpetition_attachment], filename="divorcejointpetition", title="All forms to download for your records", enabled=True)
  - al_court_bundle: ALDocumentBundle.using(elements=[divorcejointpetition_attachment],  filename="divorcejointpetition", title="All forms to deliver to court", enabled=True)
---
# Each attachment defines a key in an ALDocument. We use `i` as the placeholder here so the same template is 
# used for "preview" and "final" keys, and logic in the template checks the value of 
# `i` to show or hide the user's signature
attachment:
  name: Post-interview-Instructions
  filename: divorcejointpetition_next_steps
  docx template file: jointpetitionfordivorce_next_steps.docx
  variable name: divorcejointpetition_Post_interview_instructions[i]
  skip undefined: True
  tagged pdf: True
---
attachment:
  name: divorcejointpetition
  filename: divorcejointpetition
  variable name: divorcejointpetition_attachment[i]
  skip undefined: True
  pdf template file: jointpetitionfordivorce.pdf
  fields:
      - "trial_court_county": ${ trial_court.address.county }
      - "docket_number": ${ docket_number }
      - "users1_name_full": ${ users[0] }
      - "users2_name_full": ${ users[1] }
      - "users1_address_address": ${ users[0].address.address }
      - "users2_address_address": ${ users[1].address.address }
      - "users1_address_city": ${ users[0].address.city }
      - "users1_address_state": ${ users[0].address.state }
      - "users1_address_zip": ${ users[0].address.zip }
      - "users2_address_city": ${ users[1].address.city }
      - "users2_address_state": ${ users[1].address.state }
      - "users2_address_zip": ${ users[1].address.zip }
      - "marriage_location": ${ marriage_location }
      - "marital_home_address_on_one_line": ${ marital_home_address_on_one_line }
      - "marriage_date": ${ marriage_date.format() }
      - "last_living_together_date": ${ last_living_together_date.format() }
      - "children1_name_full_plus_birthdate": ${f"{ children[0].name_full() } {children[0].birthdate.format()}"}
      - "children2_name_full_plus_birthdate": ${f"{children[1].name_full()} {children[1].birthdate.format()}"}
      - "children3_name_full_plus_birthdate": ${f"{ children[2].name_full() } { children[2].birthdate.format() }"}
      - "children4_name_full_plus_birthdate": ${f"{ children[3].name_full() } { children[3].birthdate.format() }"}
      - "previous_action_detail": ${ divorcejointpetition_attachment.safe_value("previous_action_detail") }
      - "marriage_breakdown_date": ${ marriage_breakdown_date.format() }
      - "request_divorce_nofault": ${ request_divorce_nofault }
      - "request_separation_agreement_approval": ${ request_separation_agreement_approval }
      - "request_merge_agreement": ${ request_merge_agreement }
      - "request_survive_agreement": ${ request_survive_agreement }
      - "users1_request_name_change": ${ users1_request_name_change }
      - "users1_former_name_last": ${ users1_former_name_last }
      - "users2_request_name_change": ${ users2_request_name_change }
      - "users2_former_name_last": ${ users2_former_name_last }
      - "additional_request": ${ additional_request }
      - "additonal_request_detail": ${ additonal_request_detail }
      - "signature_date": ${ signature_date }
      # It's a signature: test which file version this is; leave empty unless it's the final version)
      - "users2_petition_signature": ${ users[1].signature if i == "final" else '' }
      # It's a signature: test which file version this is; leave empty unless it's the final version)
      - "users1_petition_signature": ${ users[0].signature if i == "final" else '' }
      - "users1_petition_signer_name_full": ${ users[0] }
      - "users2_petition_signer_name_full": ${ users2_petition_signer_name_full }
      - "users1_petition_signer_address_address": ${ users1_petition_signer_address_address }
      - "users2_petition_signer_address_address": ${ users2_petition_signer_address_address }
      - "users1_petition_signer_address_city": ${ users1_petition_signer_address_city }
      - "users1_petition_signer_address_state": ${ users1_petition_signer_address_state }
      - "users1_petition_signer_address_zip": ${ users1_petition_signer_address_zip }
      - "users2_petition_signer_address_city": ${ users2_petition_signer_address_city }
